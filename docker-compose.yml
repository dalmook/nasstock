services:
  stock-data-api:
    image: stock-price-ingest:latest
    build: .
    container_name: stock-alert-web
    restart: unless-stopped
    command:
      - uvicorn
      - nas_web_app:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    environment:
      - DB_PATH=/data/stock_prices.db
      - SYMBOLS_FILE=/app/chat-configs.js
      - UNIVERSE_SYMBOLS_FILE=/app/universe_symbols.json
    ports:
      - "${HOST_PORT:-18080}:8000"
    volumes:
      - ./data:/data
      - ./chat-configs.js:/app/chat-configs.js:ro
      - ./universe_symbols.json:/app/universe_symbols.json:ro
